services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: docmind-app
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DB_USERNAME: ${DB_USERNAME:-docmind}
      DB_PASSWORD: ${DB_PASSWORD:-docmind}
      POSTGRES_DB: ${POSTGRES_DB:-docmind}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret-must-be-at-least-32-characters-long}
    networks:
      - docmind_network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: docmind-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docmind}
      POSTGRES_USER: ${DB_USERNAME:-docmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-docmind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-docmind} -d ${POSTGRES_DB:-docmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docmind_network

  redis:
    image: redis:7.4-alpine
    container_name: docmind-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docmind_network

  minio:
    image: minio/minio:latest
    container_name: docmind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docmind_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  docmind_network:
    driver: bridge
