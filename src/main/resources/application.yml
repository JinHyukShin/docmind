server:
  port: 8080

spring:
  application:
    name: docmind
  datasource:
    url: jdbc:postgresql://localhost:5432/docmind
    username: ${DB_USERNAME:docmind}
    password: ${DB_PASSWORD:docmind}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:docmind}

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  max-tokens: ${CLAUDE_MAX_TOKENS:4096}

voyage:
  api-key: ${VOYAGE_API_KEY:}
  model: ${VOYAGE_MODEL:voyage-3}

jwt:
  secret: ${JWT_SECRET:default-dev-secret-must-be-at-least-32-characters-long}
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.docmind: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
